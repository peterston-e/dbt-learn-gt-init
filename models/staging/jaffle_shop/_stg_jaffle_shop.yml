models:
  - name: stg_jaffle_shop_customers
    description: Staged customer data from our jaffle shop app
    columns:
      - name: customer_id
        description: primary key
        data_tests:
          - unique
          - not_null
  - name: stg_jaffle_shop_orders
    description: Staged order data from our jaffle shop app.
    columns:
      - name: customer_id
        description: secondary key
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop_customers')
                field: customer_id
      - name: order_id
        description: primary key
        data_tests:
          - unique
          - not_null
      - name: status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  [
                    "placed",
                    "shipped",
                    "completed",
                    "returned",
                    "return_pending",
                  ]
